# 服务配置
server:
  port: 8080

spring:
  application:
    name: EchoNote-JAVA

  datasource:
    url: jdbc:mysql://localhost:3306/echonote?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Sa-Token配置
  sa-token:
    token-name: Authorization
    timeout: 86400
    active-timeout: -1
    is-concurrent: true
    is-share: false
    token-style: uuid
    is-log: false

  security:
    user:
      name: user
      password: 123456

# Mybatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/uno/zhuchen/echonotejava/Mapper/*.xml
  type-aliases-package: uno.zhuchen.echonotejava.Project.**.java

# MinIO配置（暂时不使用）
minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: echonote
  secure: false

